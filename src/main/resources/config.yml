# Основные настройки плагина FunTimeCustom

# Мир, в котором спавнятся ивенты (если не указан, используется мир по умолчанию)
world: "world"

# Интервал проверки случайного спавна мистических сундуков (в секундах)
mystic-chest-spawn-interval: 300

# Шанс спавна сундука при каждой проверке (0.0 - 1.0)
mystic-chest-spawn-chance: 0.5

# Время жизни сундука после появления (в секундах)
mystic-chest-lifetime: 120

# Голограммы: true - включить (требуется DecentHolograms), false - выключить
use-holograms: true

# Партиклы: true - включить
use-particles: true

# Звуки: true - включить
use-sounds: true

# Настройки маяка
beacon:
  # Интервал проверки спавна маяка (в секундах)
  spawn-interval: 3600
  # Шанс спавна при проверке
  spawn-chance: 1.0
  # Длительность ивента (в секундах)
  duration: 300
  # Время до спавна для оповещения (в секундах)
  pre-announce-time: 180
  # Настройки начисления монет
  money-rewards:
    # Vault требуется
    enabled: true
    # Зоны (по вертикали от верхушки маяка)
    zones:
      1-5: 20000
      6-10: 10000
      11-15: 5000
      16-20: 1000
      21-30: 500